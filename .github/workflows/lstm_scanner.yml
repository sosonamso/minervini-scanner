name: LSTM 스캐너 (평일 자동실행)

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 평일 UTC 22:00 = 한국 07:00
  workflow_dispatch:

jobs:
  lstm_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: 
          pip install requests pandas numpy scikit-learn
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: LSTM 스캐너 실행
        env:
          MASSIVE_TOKEN: ${{ secrets.MASSIVE_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python lstm_scanner.py

      - name: CSV 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scanner_lstm_top10.csv
          git diff --staged --quiet || git commit -m "LSTM Top10 업데이트 $(date +'%Y-%m-%d')"
          git push
