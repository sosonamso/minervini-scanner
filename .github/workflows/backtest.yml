name: 미너비니 백테스트 (수동실행)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: 백테스트 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_TOKEN:        ${{ secrets.KRX_TOKEN }}
        run: python backtest.py

      - name: CSV 레포에 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backtest_raw.csv backtest_daily.json || true
          git diff --staged --quiet || git commit -m "backtest: $(date +'%Y-%m-%d') 결과"
          git push || true

      - name: 결과 파일 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results-${{ github.run_number }}
          path: |
            backtest_raw.csv
            backtest_daily.json
          retention-days: 90