name: 미너비니 스캐너 데일리

on:
  schedule:
    - cron: '0 23 * * 0-4'   # KST 08:00
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: 스캐너 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_TOKEN:        ${{ secrets.KRX_TOKEN }}
        run: python scanner.py

      - name: 결과 파일 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scanner-kr-results-${{ github.run_number }}
          path: scanner_kr_raw.csv
          retention-days: 30