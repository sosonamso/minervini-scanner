name: 미국 소형주 스캐너 데일리

on:
  schedule:
    - cron: '0 23 * * 1-5'   # KST 08:00 (UTC 23:00, 월~금)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 소형주 스캐너 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MASSIVE_TOKEN:    ${{ secrets.MASSIVE_TOKEN }}
        run: python scanner_us_small.py