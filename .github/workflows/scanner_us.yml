name: 미장 스캐너

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  scan_us:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pandas numpy lightgbm

      - name: 스캐너 실행
        env:
          MASSIVE_TOKEN: ${{ secrets.MASSIVE_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner_us.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scanner_us_raw.csv scanner_us_all.csv
          git diff --staged --quiet || git commit -m "미장 스캐너 업데이트 $(date +'%Y-%m-%d')"
          git push