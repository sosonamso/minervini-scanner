name: 미국 스캐너 데일리

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: 스캐너 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner_us.py

      - name: CSV 레포에 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scanner_us_raw.csv || true
          git commit --allow-empty -m "scanner_us: $(date +'%Y-%m-%d') 스캔 결과"
          git pull --rebase origin main
          git push
```

---

**3. scanner_us_small.yml 비활성화**

GitHub에서 직접:
```
Actions 탭 → 미국 소형주 스캐너 데일리
→ 오른쪽 상단 ⋯ 메뉴
→ "Disable workflow" 클릭
