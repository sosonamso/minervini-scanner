name: DNN 데이터 수집 (수동실행)

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pandas numpy

      - name: DNN 데이터 수집
        env:
          MASSIVE_TOKEN: ${{ secrets.MASSIVE_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python dnn_collect.py

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: dnn-raw-data
          path: |
            dnn_raw_r5.csv
            dnn_raw_r10.csv
          retention-days: 30
