name: 미국 백테스트 (수동실행)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: 미국 백테스트 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MASSIVE_TOKEN:    ${{ secrets.MASSIVE_TOKEN }}
        run: python backtest_us.py

      - name: CSV 레포에 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backtest_us_raw.csv backtest_us_daily.json || true
          git commit --allow-empty -m "backtest_us: $(date +'%Y-%m-%d') 결과"
          git pull --rebase origin main
          git push

      - name: 결과 파일 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-us-results-${{ github.run_number }}
          path: |
            backtest_us_raw.csv
            backtest_us_daily.json
          retention-days: 90